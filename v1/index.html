<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Sandbox Pitch & Putt — App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Archivo:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (browser transpile) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Supabase JS SDK (UMD build — exposes window.supabase.createClient) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Prototype-era mock data + screens (still loaded for future reuse; not on the
     critical path for the authenticated 1v1 match flow) -->
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/screens/home.jsx"></script>
<script type="text/babel" src="components/screens/events.jsx"></script>
<script type="text/babel" src="components/screens/stats.jsx"></script>
<script type="text/babel" src="components/screens/profile.jsx"></script>
<script type="text/babel" src="components/screens/social.jsx"></script>
<script type="text/babel" src="components/screens/membership-live-share.jsx"></script>

<!-- Supabase-backed auth + match flow -->
<script type="text/babel" src="components/supabase-client.jsx"></script>
<script type="text/babel" src="components/screens/auth.jsx"></script>
<script type="text/babel" src="components/screens/match-hub.jsx"></script>
<script type="text/babel" src="components/screens/match-live.jsx"></script>

<script type="text/babel">
/* global React, ReactDOM, AuthScreens, ProfileSetupScreen, DisplayNameScreen, ResetPasswordScreen, MatchHub, MatchLive, useSession, useProfile, useRecovering */

function Root() {
  const session = useSession();
  const [profile, , reloadProfile] = useProfile(session && session.user ? session.user.id : null);
  const [recovering, clearRecovering] = useRecovering();

  // Expose reloadProfile as a global so screens deep in the auth flow can
  // force a refetch after mutating the profile (avoids a race where
  // useProfile queried before the insert/update landed).
  React.useEffect(() => { window.reloadProfile = reloadProfile; }, [reloadProfile]);

  // "Active" match the user is currently inside. Persisted so a refresh mid-round
  // drops them back in, and so WaitingForOpponent → MatchLive transitions are smooth.
  const [activeMatchId, setActiveMatchId] = React.useState(() => {
    try { return localStorage.getItem('spp_active_match'); } catch { return null; }
  });

  const openMatch = React.useCallback((id) => {
    try { localStorage.setItem('spp_active_match', id); } catch {}
    setActiveMatchId(id);
  }, []);

  const exitMatch = React.useCallback(() => {
    try { localStorage.removeItem('spp_active_match'); } catch {}
    setActiveMatchId(null);
  }, []);

  // If signed out, clear active match
  React.useEffect(() => {
    if (session === null) exitMatch();
  }, [session, exitMatch]);

  let screen;
  if (session === undefined || (session && profile === undefined)) {
    screen = <LoadingScreen/>;
  } else if (recovering && session) {
    // User arrived via the password-reset email link. Force-set a new password
    // before letting them into the app.
    screen = <ResetPasswordScreen onDone={clearRecovering}/>;
  } else if (session === null) {
    screen = <AuthScreens/>;
  } else if (profile === null) {
    // Session exists but no profile row (OAuth edge case or failed insert).
    screen = <ProfileSetupScreen session={session} onDone={reloadProfile}/>;
  } else if (!profile.handle) {
    // Profile exists but no display name yet — prompt for it.
    screen = <DisplayNameScreen profile={profile}/>;
  } else if (activeMatchId) {
    screen = <MatchLive matchId={activeMatchId} profile={profile} onExit={exitMatch}/>;
  } else {
    screen = <MatchHub profile={profile} onOpenMatch={openMatch}/>;
  }

  return (
    <div className="phone-wrap">
      <PhoneStage>
        <div className="screen-enter" style={{ position: 'absolute', inset: 0, overflow: 'auto' }}>
          {screen}
        </div>
      </PhoneStage>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      background: 'var(--canvas)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: 'var(--forest)',
    }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, opacity: 0.6 }}>Loading…</div>
    </div>
  );
}

// ─── Phone stage: scales a 402×874 "phone" to viewport on desktop; fullbleed on mobile ───
function PhoneStage({ children }) {
  const W = 402, H = 874;
  const [scale, setScale] = React.useState(1);
  const [isMobile, setIsMobile] = React.useState(false);

  React.useEffect(() => {
    const update = () => {
      const vw = window.innerWidth, vh = window.innerHeight;
      const mobile = vw < 640;
      setIsMobile(mobile);
      if (mobile) {
        setScale(1);
      } else {
        const pad = 40;
        setScale(Math.min((vw - pad) / W, (vh - pad) / H, 1.1));
      }
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  if (isMobile) {
    return (
      <div style={{
        width: '100vw', height: '100dvh',
        background: 'var(--canvas)', position: 'relative', overflow: 'hidden',
      }}>
        {children}
      </div>
    );
  }

  return (
    <div style={{
      width: W, height: H, position: 'relative',
      transform: `scale(${scale})`, transformOrigin: 'center center',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        borderRadius: 48, overflow: 'hidden',
        background: 'var(--canvas)',
        boxShadow: '0 40px 80px rgba(0,0,0,0.35), 0 0 0 10px #1a1a1a, 0 0 0 11px #2a2a2a',
      }}>
        {/* Dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 120, height: 34, borderRadius: 22, background: '#000', zIndex: 100,
          pointerEvents: 'none',
        }}/>
        <div style={{
          position: 'absolute', top: 18, left: 26, zIndex: 100,
          fontFamily: '-apple-system, system-ui', fontSize: 15, fontWeight: 600,
          color: 'var(--cream)', mixBlendMode: 'difference',
        }}>9:41</div>
        <div style={{
          position: 'absolute', top: 20, right: 26, zIndex: 100,
          display: 'flex', alignItems: 'center', gap: 6,
        }}>
          <svg width="18" height="11" viewBox="0 0 19 12" style={{ mixBlendMode: 'difference' }}>
            <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="#fff"/>
            <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="#fff"/>
            <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="#fff"/>
            <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="#fff"/>
          </svg>
          <svg width="24" height="11" viewBox="0 0 27 13" style={{ mixBlendMode: 'difference' }}>
            <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#fff" strokeOpacity="0.5" fill="none"/>
            <rect x="2" y="2" width="18" height="9" rx="2" fill="#fff"/>
          </svg>
        </div>

        {children}

        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          width: 134, height: 5, borderRadius: 3, background: 'rgba(14,28,19,0.4)',
          zIndex: 100, pointerEvents: 'none',
        }}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>

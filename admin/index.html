<!doctype html>
<!-- Sandbox Admin — deployed to admin.sbx.golf via Vercel (Root Directory = admin) -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sandbox Admin</title>
<meta name="theme-color" content="#0E2818"/>
<meta name="robots" content="noindex"/>
<link rel="icon" href="assets/favicon.svg"/>
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Bagel+Fat+One&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="root"></div>

<!-- React + Babel (browser transpile) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Supabase JS SDK (UMD — exposes window.supabase.createClient) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Admin client + shared UI + data + screens + app (app mounts last) -->
<script type="text/babel" src="components/supabase-client.jsx"></script>
<script type="text/babel" src="components/admin-ui.jsx"></script>
<script type="text/babel" src="components/courses-data.jsx"></script>
<script type="text/babel" src="components/tee-slots-data.jsx"></script>
<script type="text/babel" src="components/bookings-data.jsx"></script>
<script type="text/babel" src="components/events-data.jsx"></script>
<script type="text/babel" src="components/users-data.jsx"></script>
<script type="text/babel" src="components/manager-data.jsx"></script>
<script type="text/babel" src="components/rc-data.jsx"></script>
<script type="text/babel" src="components/screens/courses.jsx"></script>
<script type="text/babel" src="components/screens/scorecards.jsx"></script>
<script type="text/babel" src="components/screens/tee-slots.jsx"></script>
<script type="text/babel" src="components/screens/bookings.jsx"></script>
<script type="text/babel" src="components/screens/events.jsx"></script>
<script type="text/babel" src="components/screens/users.jsx"></script>
<script type="text/babel" src="components/screens/manager.jsx"></script>
<script type="text/babel" src="components/admin-app.jsx"></script>

</body>
</html>
